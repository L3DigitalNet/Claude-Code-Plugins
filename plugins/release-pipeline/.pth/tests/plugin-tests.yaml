id: force_push_guard_blocks_force_flag
name: force-push-guard blocks --force flag
mode: plugin
type: hook-script
script: scripts/force-push-guard.sh
stdin:
  tool_name: Bash
  tool_input:
    command: git push origin main --force
expect:
  exit_code: 2
  stdout_contains: block
tags:
  - force-push-guard
  - hook

