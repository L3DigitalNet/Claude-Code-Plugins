id: detect_test_runner_finds_pytest_from_pyproject_toml
name: detect-test-runner finds pytest from pyproject.toml
mode: plugin
type: exec
command: bash scripts/detect-test-runner.sh /tmp/pth-pytest-fixture
expect:
  exit_code: 0
  stdout_contains: pytest
setup:
  - exec: |-
      mkdir -p /tmp/pth-pytest-fixture && printf '[tool.pytest.ini_options]
      ' > /tmp/pth-pytest-fixture/pyproject.toml
teardown:
  - exec: rm -rf /tmp/pth-pytest-fixture
tags:
  - detect-test-runner

