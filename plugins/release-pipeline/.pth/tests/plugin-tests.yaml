id: detect_test_runner_falls_back_to_claude_md_test_command
name: detect-test-runner falls back to CLAUDE.md test command
mode: plugin
type: exec
command: bash scripts/detect-test-runner.sh /tmp/pth-claudemd-fixture
expect:
  exit_code: 0
  stdout_contains: pytest
setup:
  - exec: |-
      mkdir -p /tmp/pth-claudemd-fixture && printf '## Testing

      ```
      pytest tests/ -m unit
      ```
      ' > /tmp/pth-claudemd-fixture/CLAUDE.md
teardown:
  - exec: rm -rf /tmp/pth-claudemd-fixture
tags:
  - detect-test-runner
  - edge-case
