name: Format

on:
  push:
    branches: ["main"]
    paths:
      - "**/*.md"
      - "**/*.json"
      - "**/*.jsonc"
      - "**/*.yml"
      - "**/*.yaml"
      - "**/*.code-workspace"
      - ".prettierrc.json"
      - ".prettierignore"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/format.yml"
  pull_request:
    paths:
      - "**/*.md"
      - "**/*.json"
      - "**/*.jsonc"
      - "**/*.yml"
      - "**/*.yaml"
      - "**/*.code-workspace"
      - ".prettierrc.json"
      - ".prettierignore"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/format.yml"

jobs:
  prettier:
    name: Prettier
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7
      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
      - name: Install pinned Prettier
        run: npm ci
      - name: Check formatting
        run: npx prettier --check .
