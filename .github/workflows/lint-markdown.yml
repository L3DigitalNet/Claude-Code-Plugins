name: Lint Markdown

on:
  push:
    branches: ["main"]
    paths:
      - "**/*.md"
      - ".markdownlint.json"
      - ".markdownlint-cli2.jsonc"
      - ".github/workflows/lint-markdown.yml"
  pull_request:
    paths:
      - "**/*.md"
      - ".markdownlint.json"
      - ".markdownlint-cli2.jsonc"
      - ".github/workflows/lint-markdown.yml"

jobs:
  lint-markdown:
    uses: L3DigitalNet/project-standards/.github/workflows/lint-markdown.yml@v2
    with:
      globs: "**/*.md"
